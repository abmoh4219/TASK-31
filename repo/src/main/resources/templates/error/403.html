<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Access Denied</title>
</head>
<body>
<div layout:fragment="content">
    <div class="card" style="max-width: 640px; margin: 60px auto;">
        <div class="card-body text-center">
            <i class="bi bi-shield-x" style="font-size: 56px; color: var(--danger);"></i>
            <h2 class="mt-3">Access Denied (403)</h2>
            <p class="text-muted">
                You don't have permission to access this resource.
            </p>
            <div class="alert alert-warning text-start mt-3">
                <strong>Why am I blocked?</strong>
                <p class="mb-0" th:text="${blockReason != null ? blockReason : 'This page requires a role you do not currently have. Please contact an administrator if you believe you should have access.'}">
                    This page requires a higher role.
                </p>
            </div>
            <a th:href="@{/}" class="btn btn-primary mt-2">
                <i class="bi bi-house"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
