<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Server Error</title></head>
<body>
<div layout:fragment="content">
    <div class="card" style="max-width: 640px; margin: 60px auto;">
        <div class="card-body text-center">
            <i class="bi bi-bug" style="font-size: 56px; color: var(--warning);"></i>
            <h2 class="mt-3">Server Error (500)</h2>
            <p class="text-muted">Something went wrong on our end. The error has been logged.</p>
            <a th:href="@{/}" class="btn btn-primary"><i class="bi bi-house"></i> Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
