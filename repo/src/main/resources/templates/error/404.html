<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Not Found</title></head>
<body>
<div layout:fragment="content">
    <div class="card" style="max-width: 640px; margin: 60px auto;">
        <div class="card-body text-center">
            <i class="bi bi-question-circle" style="font-size: 56px; color: var(--text-muted);"></i>
            <h2 class="mt-3">Page Not Found (404)</h2>
            <p class="text-muted">The page you're looking for doesn't exist or has been moved.</p>
            <a th:href="@{/}" class="btn btn-primary"><i class="bi bi-house"></i> Back to Dashboard</a>
        </div>
    </div>
</div>
</body>
</html>
