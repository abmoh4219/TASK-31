<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Users</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h2>User Management <span class="status-badge status-high">ADMIN ONLY</span></h2>
            <p class="text-muted mb-0">Create accounts, change roles, and deactivate access.</p>
        </div>
        <a th:href="@{/admin/users/new}" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Create User
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                <div class="empty-icon"><i class="bi bi-people"></i></div>
                <h3>No users yet</h3>
                <p>Create the first account to get started.</p>
                <a th:href="@{/admin/users/new}" class="btn btn-primary">Create user</a>
            </div>
            <table th:if="${not #lists.isEmpty(users)}" class="table mb-0">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Last Login</th>
                        <th class="text-end">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td><strong th:text="${u.username}">username</strong></td>
                        <td th:text="${u.fullName}">name</td>
                        <td>
                            <span class="role-badge"
                                  th:classappend="'role-' + ${#strings.toLowerCase(#strings.replace(u.role, '_', '-'))}"
                                  th:text="${u.role}">ROLE</span>
                        </td>
                        <td>
                            <span class="status-badge"
                                  th:classappend="${u.active ? 'status-active' : 'status-rejected'}"
                                  th:text="${u.active ? 'ACTIVE' : 'INACTIVE'}">STATUS</span>
                        </td>
                        <td>
                            <small class="text-muted"
                                   th:text="${u.lastLoginAt != null ? #temporals.format(u.lastLoginAt, 'yyyy-MM-dd HH:mm') : 'never'}">date</small>
                        </td>
                        <td class="text-end">
                            <a th:href="@{'/admin/users/' + ${u.id} + '/edit'}" class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i> Edit
                            </a>
                            <form th:if="${u.active}"
                                  th:action="@{'/admin/users/' + ${u.id} + '/deactivate'}" method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('Deactivate ' + this.dataset.user + '?');"
                                  th:attr="data-user=${u.username}">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-person-dash"></i> Deactivate
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
