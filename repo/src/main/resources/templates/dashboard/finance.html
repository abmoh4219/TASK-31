<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Analytics</title></head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-start mb-4">
        <div>
            <h2 style="margin-bottom:4px;">Analytics</h2>
            <p class="text-muted mb-0">Coupon issuance, redemption and discount utilization.</p>
        </div>
        <div sec:authorize="hasAnyRole('FINANCE','ADMIN')">
            <a th:href="@{/analytics/export}" class="btn btn-primary">
                <i class="bi bi-download"></i> Export to CSV
            </a>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="kpi-card">
                <div class="kpi-label">Active Campaigns</div>
                <div class="kpi-value" th:text="${activeCampaigns}">0</div>
                <div class="kpi-trend"><i class="bi bi-megaphone"></i> across all stores</div>
            </div>
        </div>
    </div>

    <div class="card mt-4">
        <div class="card-body">
            <p class="text-muted mb-0"><i class="bi bi-info-circle"></i>
                Full analytics charts (top campaigns, redemptions over time) appear here once Phase 6 is complete.</p>
        </div>
    </div>
</div>
</body>
</html>
