<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Customer Service</title></head>
<body>
<div layout:fragment="content">
    <div class="mb-4">
        <h2>Customer Service Console</h2>
        <p class="text-muted">Read-only view of campaigns and content for support staff.</p>
    </div>
    <div class="card">
        <div class="card-body">
            <p class="mb-0 text-muted">
                <i class="bi bi-info-circle"></i>
                Browse campaigns from the sidebar, or look up coupon codes via the lookup form
                that appears in Phase 7.
            </p>
        </div>
    </div>
</div>
</body>
</html>
