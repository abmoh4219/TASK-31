# Retail Campaign Governance — Application Configuration
#
# IMPORTANT: this file contains NO plaintext secrets. Every sensitive value is sourced
# from an environment variable with no built-in default — the app will refuse to start
# if a secret is missing. docker-compose.yml and docker-compose.test.yml supply working
# local-dev defaults via `${VAR:-default}`, so `docker compose up --build` still works
# out of the box. In production, set the env vars from a secret manager.
#
# Required secrets:
#   DB_PASSWORD         — datasource password
#   HMAC_KEY            — signing key for RequestSigningFilter
#   ENCRYPTION_KEY      — AES-256-GCM master key for EncryptionService (at-rest encryption)
#
# Non-secret values (usernames, URLs, pool sizes) still have safe defaults inline.
spring:
  application:
    name: retail-campaign
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/retail_campaign?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:retail_user}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB
  mvc:
    hiddenmethod:
      filter:
        enabled: true

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  servlet:
    session:
      timeout: 30m

logging:
  level:
    root: INFO
    com.meridian.retail: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

# Application-specific settings (all hardcoded)
app:
  upload:
    path: /app/uploads
    max-file-size-bytes: 52428800
    chunk-size-bytes: 1048576
  backup:
    path: /app/backups
    retention-days: 14
  encryption:
    # AES-256-GCM master key. NO plaintext fallback — supply via ENCRYPTION_KEY env var.
    # docker-compose.yml sets this. In production, inject from a secret manager.
    key: ${ENCRYPTION_KEY:${APP_ENCRYPTION_KEY:}}
  signing:
    # HMAC-SHA256 signing secret for RequestSigningFilter. Supply via HMAC_KEY env var.
    secret: ${HMAC_KEY:${APP_SIGNING_SECRET:}}
  rate-limit:
    standard: 60
    export: 10
  temp-link:
    expiry-minutes: 10
  lockout:
    account-max-attempts: 5
    account-window-minutes: 15
    ip-max-attempts: 20
    ip-window-minutes: 60
  captcha:
    show-after-failures: 3
