# Docker profile — overrides for the in-container runtime.
# Datasource points to the mysql service defined in docker-compose.yml.
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/retail_campaign?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: retail_user
    password: retail_pass
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    com.meridian.retail: INFO
