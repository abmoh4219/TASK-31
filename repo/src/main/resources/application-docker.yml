# Docker profile — overrides for the in-container runtime.
# Datasource still prefers environment variables (compose sets them), with defaults
# pointing to the mysql service defined in docker-compose.yml.
server:
  ssl:
    enabled: false

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/retail_campaign?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:retail_user}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:retail_pass}}
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: INFO
    com.meridian.retail: INFO
