# Test compose — runs unit + integration tests with Testcontainers.
# Tests use Testcontainers (jdbc:tc:mysql:8.0:///...) so the test image must be able to
# launch containers. We expose the host docker socket for that purpose.
version: '3.8'

services:

  setup:
    image: alpine:3.18
    volumes:
      - .:/workspace
    command: >
      sh -c "
        if [ ! -f /workspace/.env ]; then
          echo 'First run detected — copying .env.example to .env';
          cp /workspace/.env.example /workspace/.env;
          echo '.env created successfully';
        else
          echo '.env already exists — skipping copy';
        fi
      "
    restart: "no"

  mysql-test:
    image: mysql:8.0
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "retail_user", "-pretail_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      setup:
        condition: service_completed_successfully

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: retail-test-runner
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      setup:
        condition: service_completed_successfully
      mysql-test:
        condition: service_healthy
