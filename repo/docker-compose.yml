# Unified compose file.
#
#   App + MySQL (default):
#       docker compose up --build
#
#   Backend unit tests only (no DB):
#       docker compose --profile unit-test run --rm --build unit-test
#
#   Backend API tests (real MySQL via Testcontainers in docker-in-docker, OR
#   via the sibling mysql-test service when running inside the compose network):
#       docker compose --profile api-test run --rm --build api-test
#
#   Frontend JS unit tests (Jest):
#       See run_tests.sh — runs via plain docker run with node:20-alpine.
#
#   Playwright e2e tests (headless, against the running app):
#       See run_tests.sh — starts mysql+app, then runs playwright container.
services:

  setup:
    image: alpine:3.18
    volumes:
      - .:/workspace
    command: >
      sh -c "
        if [ ! -f /workspace/.env ]; then
          echo 'First run detected — copying .env.example to .env';
          cp /workspace/.env.example /workspace/.env;
          echo '.env created successfully';
        else
          echo '.env already exists — skipping copy';
        fi
      "
    restart: "no"

  mysql:
    image: mysql:8.0
    command:
      - --log-bin-trust-function-creators=ON
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-retail_campaign}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-retail_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-retail_pass}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "retail_user", "-pretail_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      setup:
        condition: service_completed_successfully
    networks:
      - retail-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/retail_campaign?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-retail_user}
      DB_PASSWORD: ${DB_PASSWORD:-retail_pass}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-retail_pass}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-com.mysql.cj.jdbc.Driver}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-retail-campaign-aes-key-32chars!!}
      HMAC_KEY: ${HMAC_KEY:-retail-campaign-hmac-signing-key!!}
      APP_ENCRYPTION_KEY: ${ENCRYPTION_KEY:-retail-campaign-aes-key-32chars!!}
      APP_SIGNING_SECRET: ${HMAC_KEY:-retail-campaign-hmac-signing-key!!}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    depends_on:
      mysql:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    volumes:
      - upload-data:/app/uploads
      - backup-data:/app/backups
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - retail-net

  # ── Backend unit test service (no DB) ──────────────────────────────────────
  # Profile: unit-test
  # Runs: mvn test (Surefire scoped to com.meridian.retail.unit.**)
  unit-test:
    profiles: ["unit-test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    command: sh -c "mvn test --no-transfer-progress -DfailIfNoTests=false -Dspring.profiles.active=test"
    environment:
      SPRING_PROFILES_ACTIVE: test
      ENCRYPTION_KEY: retail-campaign-aes-key-32chars!!
      HMAC_KEY: retail-campaign-hmac-signing-key!!
      DB_PASSWORD: retail_pass

  # ── MySQL for API tests ─────────────────────────────────────────────────────
  mysql-test:
    image: mysql:8.0
    profiles: ["api-test"]
    command:
      - --log-bin-trust-function-creators=ON
    env_file:
      - path: .env
        required: false
    environment:
      MYSQL_DATABASE: retail_campaign_test
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${MYSQL_USER:-retail_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-retail_pass}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "retail_user", "-pretail_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      setup:
        condition: service_completed_successfully

  # ── Backend API test service (real MySQL via Testcontainers or sibling) ─────
  # Profile: api-test
  # Runs: mvn verify (Failsafe scoped to com.meridian.retail.api.**)
  api-test:
    profiles: ["api-test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    command: sh -c "mvn verify -Dsurefire.skip=true --no-transfer-progress -DfailIfNoTests=false -Dspring.profiles.active=test"
    depends_on:
      mysql-test:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: test
      IT_DATASOURCE_URL: jdbc:mysql://mysql-test:3306/retail_campaign_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      IT_DATASOURCE_USERNAME: retail_user
      IT_DATASOURCE_PASSWORD: retail_pass
      DB_PASSWORD: ${DB_PASSWORD:-retail_pass}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-retail-campaign-aes-key-32chars!!}
      HMAC_KEY: ${HMAC_KEY:-retail-campaign-hmac-signing-key!!}
      TESTCONTAINERS_RYUK_DISABLED: "true"

  # ── Playwright e2e test service ─────────────────────────────────────────────
  # Profile: e2e-test
  # Waits for the app healthcheck (service_healthy) before launching Chromium.
  playwright:
    profiles: ["e2e-test"]
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    working_dir: /e2e
    volumes:
      - ./src/test/e2e:/e2e
    environment:
      BASE_URL: https://app:8080
    command: sh -c "npm install --silent && npx playwright install chromium && npx playwright test"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - retail-net

volumes:
  mysql-data:
  upload-data:
  backup-data:

networks:
  retail-net:
    name: retail-net
